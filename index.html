<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>愛のアブダクション | プレイ版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" class="app">
    <section id="titleScreen" class="screen title-screen">
      <!-- Version policy: small changes +0.01, major changes +0.1. -->
      <p class="version-badge" aria-label="現在のバージョン">ver1.40</p>
      <div class="screen-card">
        <p class="eyebrow">Lovely Encounter</p>
        <h1>愛のアブダクション</h1>
        <p class="lead">無表情な銀緑の侵略者と、UFOで始まる短いプレイ版です。</p>
        <div class="button-stack">
          <button id="startButton" class="primary-button" type="button">はじめから</button>
          <button id="continueButton" type="button">ロード</button>
          <button id="chapterSelectButton" type="button">章選択</button>
        </div>
      </div>
    </section>

    <section id="chapterScreen" class="screen hidden">
      <div class="screen-card">
        <p class="eyebrow">Chapter Select</p>
        <h2>章選択</h2>
        <div id="chapterList" class="chapter-list"></div>
        <button id="chapterBackButton" type="button">タイトルへ戻る</button>
      </div>
    </section>

    <section id="gameScreen" class="stage hidden" aria-label="ノベルゲーム画面">
      <div id="background" class="background placeholder-bg"></div>
      <div id="characters" class="characters" aria-hidden="true"></div>
      <aside id="assetOverlay" class="asset-overlay" aria-label="現在表示中の画像アセット"></aside>

      <header class="top-bar">
        <div>
          <p id="chapterTitle" class="chapter-title">第1章</p>
          <p id="sceneLabel" class="scene-label">Scene</p>
        </div>
        <button id="menuButton" class="icon-button" type="button" aria-expanded="false" aria-controls="menuPanel">☰</button>
      </header>

      <section id="menuPanel" class="menu-panel hidden" aria-label="メニュー">
        <button id="saveButton" type="button">セーブ</button>
        <button id="loadButton" type="button">ロード</button>
        <button id="backlogButton" type="button">バックログ</button>
        <button id="chapterButton" type="button">章選択</button>
        <button id="titleButton" type="button">タイトルへ</button>
      </section>

      <section id="messageBox" class="message-box">
        <p id="speaker" class="speaker"></p>
        <p id="text" class="text"></p>
        <div id="choices" class="choices"></div>
        <button id="nextButton" class="next-button" type="button">次へ</button>
      </section>
    </section>

    <dialog id="backlogDialog" class="backlog-dialog">
      <div class="dialog-header">
        <h2>バックログ</h2>
        <button id="closeBacklogButton" type="button">閉じる</button>
      </div>
      <div id="backlogList" class="backlog-list"></div>
    </dialog>
  </main>

  <script src="data/characters.js"></script>
  <script src="data/backgrounds.js"></script>
  <script src="data/chapters/chapterIndex.js"></script>
  <script src="data/chapters/prologue.js"></script>
  <script src="data/chapters/chapter01.js"></script>
  <script src="data/chapters/chapter02.js"></script>
  <script src="data/chapters/chapter03.js"></script>
  <script src="data/chapters/chapter04.js"></script>
  <script src="data/chapters/chapter05.js"></script>
  <script src="script.js"></script>
</body>
</html>
