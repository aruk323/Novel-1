<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Novel-1 | スマホ向け長編ノベルゲーム土台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="app" class="app" aria-live="polite">
    <section id="stage" class="stage" aria-label="ノベルゲーム画面">
      <div id="background" class="background placeholder-bg"></div>
      <div id="characters" class="characters" aria-hidden="true"></div>
      <header class="top-bar">
        <div>
          <p id="chapterTitle" class="chapter-title">読み込み中...</p>
          <p id="sceneLabel" class="scene-label">Scene</p>
        </div>
        <button id="menuButton" class="icon-button" type="button" aria-expanded="false" aria-controls="menuPanel">☰</button>
      </header>
      <section id="menuPanel" class="menu-panel hidden" aria-label="メニュー">
        <button id="saveButton" type="button">セーブ</button>
        <button id="loadButton" type="button">ロード</button>
        <button id="autoLoadButton" type="button">オートセーブから再開</button>
        <button id="resetButton" type="button">最初から</button>
      </section>
      <section id="messageBox" class="message-box">
        <p id="speaker" class="speaker"></p>
        <p id="text" class="text"></p>
        <div id="choices" class="choices"></div>
        <button id="nextButton" class="next-button" type="button">次へ</button>
      </section>
    </section>
  </main>
  <script src="scenarios/prologue.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
